name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: End-to-end tests (deterministic offline mode)
        run: uv run pytest tests/ -q
        env:
          A2A_DEMO_OFFLINE: "1"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t a2a-mcp-multi-agent .
      - name: Compose e2e (offline)
        run: docker compose run --rm demo
